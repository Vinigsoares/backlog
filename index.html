<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BACKLOG // PAINEL EXECUTIVO</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0c0e14;
  --bg2:     #111520;
  --bg3:     #161b28;
  --panel:   #1a2035;
  --border:  #232d42;
  --cyan:    #00e5ff;
  --pink:    #ff2d78;
  --purple:  #9d4edd;
  --yellow:  #ffd60a;
  --green:   #39ff14;
  --orange:  #ff8c00;
  --text:    #d4dff0;
  --muted:   #4a5870;
  --font-mono: 'Share Tech Mono', monospace;
  --font-ui:   'Exo 2', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-ui);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 60% 40% at 10% 0%, rgba(0,229,255,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 90% 100%, rgba(157,78,221,0.06) 0%, transparent 60%);
}

/* ── HEADER ── */
.header {
  padding: 24px 36px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 18px;
}
.header-accent {
  width: 4px;
  height: 48px;
  background: linear-gradient(180deg, var(--cyan), var(--purple));
  border-radius: 2px;
  flex-shrink: 0;
}
.header-text h1 {
  font-size: 22px;
  font-weight: 900;
  letter-spacing: 1px;
  background: linear-gradient(120deg, #fff 30%, var(--cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-text p {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 2px;
  margin-top: 3px;
}
.header-counters {
  margin-left: auto;
  display: flex;
  gap: 28px;
}
.counter { text-align: right; }
.counter .val {
  display: block;
  font-family: var(--font-mono);
  font-size: 26px;
  color: var(--cyan);
  line-height: 1;
}
.counter .lbl {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* ── TOP BAR ── */
.topbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 14px 36px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}

.search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 300px; }
.search-wrap input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  padding: 10px 12px 10px 36px;
  border-radius: 5px;
  outline: none;
  transition: border-color .2s;
}
.search-wrap input:focus { border-color: var(--cyan); }
.search-wrap::before {
  content: '⌕';
  position: absolute;
  left: 11px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 17px;
  pointer-events: none;
}

.sel-wrap { display: flex; flex-direction: column; gap: 3px; }
.sel-wrap label {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
}
select {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 9px 11px;
  border-radius: 5px;
  outline: none;
  cursor: pointer;
  transition: border-color .2s;
}
select:focus { border-color: var(--cyan); }

.btn {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 1px;
  padding: 10px 16px;
  border-radius: 5px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  transition: all .15s;
  white-space: nowrap;
  align-self: flex-end;
}
.btn:hover { border-color: var(--cyan); color: var(--cyan); }

.btn-playnow {
  background: linear-gradient(135deg, var(--pink), var(--purple));
  border: none;
  color: #fff;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 2px;
  padding: 10px 20px;
  align-self: flex-end;
}
.btn-playnow:hover { opacity: .88; color: #fff; border: none; transform: scale(1.02); }

/* ── QUICK TAGS ── */
.quickbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 8px 36px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}
.qlabel {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-right: 2px;
}
.qtag {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.qtag:hover { color: var(--text); border-color: var(--text); }
.qtag.active { background: var(--purple); border-color: var(--purple); color: #fff; }

/* ── RESULT BAR ── */
.resultbar {
  padding: 7px 36px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  letter-spacing: 1px;
}
.resultbar span { color: var(--cyan); }

/* ── TABLE ── */
.table-scroll { overflow-x: auto; padding: 0 36px 48px; }

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 14px;
}

thead tr { border-bottom: 2px solid var(--border); }

th {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 12px 16px;
  text-align: left;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
  transition: color .15s;
}
th:hover { color: var(--cyan); }
th.sorted { color: var(--cyan); }

tbody tr {
  border-bottom: 1px solid rgba(35,45,66,.6);
  transition: background .1s;
}
tbody tr:hover { background: rgba(0,229,255,.035); }

td {
  padding: 13px 16px;
  vertical-align: middle;
  font-size: 13.5px;
  line-height: 1.4;
}

.td-n { font-family: var(--font-mono); font-size: 11px; color: var(--muted); width: 38px; }
.td-name { font-weight: 700; color: #e8f0fc; min-width: 200px; max-width: 250px; }
.td-cat { white-space: nowrap; }

/* CATEGORY BADGES */
.badge {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 1px;
  padding: 3px 9px;
  border-radius: 3px;
  text-transform: uppercase;
  white-space: nowrap;
}
.b-acao      { background: rgba(255,45,120,.15);  color: var(--pink);   border:1px solid rgba(255,45,120,.3); }
.b-terror    { background: rgba(157,78,221,.15);  color: var(--purple); border:1px solid rgba(157,78,221,.3); }
.b-rpg       { background: rgba(255,214,10,.12);  color: var(--yellow); border:1px solid rgba(255,214,10,.25); }
.b-souls     { background: rgba(57,255,20,.1);    color: var(--green);  border:1px solid rgba(57,255,20,.2); }
.b-narrativa { background: rgba(0,229,255,.1);    color: var(--cyan);   border:1px solid rgba(0,229,255,.2); }
.b-fps       { background: rgba(255,100,50,.13);  color: #ff6432;       border:1px solid rgba(255,100,50,.25); }
.b-estrategia{ background: rgba(255,140,0,.12);   color: var(--orange); border:1px solid rgba(255,140,0,.25); }
.b-corrida   { background: rgba(180,200,255,.08); color: #8ba4d4;       border:1px solid rgba(180,200,255,.15); }
.b-simulacao { background: rgba(100,220,180,.1);  color: #5cd6b4;       border:1px solid rgba(100,220,180,.2); }
.b-indie     { background: rgba(190,130,255,.1);  color: #c49cf5;       border:1px solid rgba(190,130,255,.2); }

/* DURAÇÃO */
.td-dur { font-family: var(--font-mono); font-size: 13px; white-space: nowrap; }

/* ENGATE */
.engate { font-family: var(--font-mono); font-size: 12px; font-weight: 700; white-space: nowrap; }
.e-rapido { color: var(--green); }
.e-medio  { color: var(--yellow); }
.e-lento  { color: var(--pink); }

/* VALHALLA DOTS */
.vbar { display: flex; gap: 4px; align-items: center; }
.vdot { width: 9px; height: 9px; border-radius: 50%; background: var(--border); }
.vbar.v1 .vdot:nth-child(-n+1) { background: var(--green); }
.vbar.v2 .vdot:nth-child(-n+2) { background: #9ef01a; }
.vbar.v3 .vdot:nth-child(-n+3) { background: var(--yellow); }
.vbar.v4 .vdot:nth-child(-n+4) { background: var(--orange); }
.vbar.v5 .vdot:nth-child(-n+5) { background: var(--pink); }

/* CARGA */
.carga { font-family: var(--font-mono); font-size: 12px; font-weight: 600; white-space: nowrap; }
.c-baixa  { color: var(--green); }
.c-media  { color: var(--cyan); }
.c-alta   { color: var(--yellow); }
.c-maxima { color: var(--pink); }

/* DOPAMINA */
.td-dopa { font-size: 12.5px; color: #8fa0bc; min-width: 180px; max-width: 230px; line-height: 1.5; }

/* EMPTY */
.empty {
  display: none;
  text-align: center;
  padding: 60px;
  font-family: var(--font-mono);
  color: var(--muted);
  letter-spacing: 3px;
  font-size: 13px;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

@media (max-width: 700px) {
  .header, .topbar, .quickbar, .resultbar, .table-scroll { padding-left: 16px; padding-right: 16px; }
  .header { flex-wrap: wrap; }
  .header-counters { margin-left: 0; }
}
</style>
</head>

const catLabel = {acao:"Ação",terror:"Terror",rpg:"RPG",souls:"Soulslike",narrativa:"Narrativa",fps:"FPS",estrategia:"Estratégia",corrida:"Corrida",simulacao:"Simulação",indie:"Indie"};
const engOrder = {Rápido:1,Médio:2,Lento:3};
const carOrder = {Baixa:1,Média:2,Alta:3,Máxima:4};

let sortCol = null, sortDir = 1, activeQ = null;

function filteredData() {
  const s  = document.getElementById('srch').value.toLowerCase();
  const fe = document.getElementById('fEngate').value;
  const fv = document.getElementById('fValhalla').value;
  const fc = document.getElementById('fCarga').value;
  const ft = document.getElementById('fCat').value;

  return G.filter(g => {
    const [name,cat,dur,eng,val,car,dopa] = g;
    if (s && !name.toLowerCase().includes(s) && !dopa.toLowerCase().includes(s)) return false;
    if (fe && eng !== fe) return false;
    if (fv && val > +fv) return false;
    if (fc && car !== fc) return false;
    if (ft && cat !== ft) return false;
    if (activeQ === 'destruido' && (car !== 'Baixa' || eng !== 'Rápido')) return false;
    if (activeQ === 'foco' && car !== 'Alta' && car !== 'Máxima') return false;
    if (activeQ === 'historia' && cat !== 'narrativa' && cat !== 'rpg') return false;
    if (activeQ === 'curto' && dur >= 15) return false;
    if (activeQ === 'sempadding' && val > 1) return false;
    return true;
  });
}

function sorted(data) {
  if (!sortCol) return data;
  return [...data].sort((a,b) => {
    if (sortCol==='name') return sortDir*a[0].localeCompare(b[0]);
    if (sortCol==='cat')  return sortDir*a[1].localeCompare(b[1]);
    if (sortCol==='dur')  return sortDir*(a[2]-b[2]);
    if (sortCol==='eng')  return sortDir*(engOrder[a[3]]-engOrder[b[3]]);
    if (sortCol==='val')  return sortDir*(a[4]-b[4]);
    if (sortCol==='car')  return sortDir*(carOrder[a[5]]-carOrder[b[5]]);
    return 0;
  });
}

function render() {
  const data = sorted(filteredData());
  const tb = document.getElementById('tbody');
  tb.innerHTML = '';
  const dots = [1,2,3,4,5].map(()=>'<div class="vdot"></div>').join('');
  data.forEach((g,i) => {
    const [name,cat,dur,eng,val,car,dopa] = g;
    const ec = eng==='Rápido'?'e-rapido':eng==='Médio'?'e-medio':'e-lento';
    const cc = 'c-'+car.toLowerCase().replace(/[áàã]/g,'a').replace(/[éê]/g,'e').replace(/[í]/g,'i').replace(/[ó]/g,'o').replace(/[ú]/g,'u');
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="td-n">${i+1}</td>
      <td class="td-name">${name}</td>
      <td class="td-cat"><span class="badge b-${cat}">${catLabel[cat]}</span></td>
      <td class="td-dur">~${dur}h</td>
      <td><span class="engate ${ec}">${eng}</span></td>
      <td><div class="vbar v${val}">${dots}</div></td>
      <td><span class="carga ${cc}">${car}</span></td>
      <td class="td-dopa">${dopa}</td>`;
    tb.appendChild(tr);
  });
  const n = data.length, tot = G.length;
  document.getElementById('cVisible').textContent = n;
  document.getElementById('rVisible').textContent = n;
  document.getElementById('rTotal').textContent   = tot;
  document.getElementById('empty').style.display  = n===0?'block':'none';
}

// Sort headers
document.querySelectorAll('th[data-s]').forEach(th => {
  th.style.cursor = 'pointer';
  th.addEventListener('click', () => {
    const c = th.dataset.s;
    if (sortCol===c) sortDir*=-1; else { sortCol=c; sortDir=1; }
    document.querySelectorAll('th[data-s]').forEach(t=>{ t.classList.remove('sorted'); t.querySelector('span').textContent='↕'; });
    th.classList.add('sorted');
    th.querySelector('span').textContent = sortDir===1?'↑':'↓';
    render();
  });
});

// Quick filters
document.querySelectorAll('.qtag').forEach(b => {
  b.addEventListener('click', () => {
    const k = b.dataset.q;
    if (activeQ===k) { activeQ=null; b.classList.remove('active'); }
    else { activeQ=k; document.querySelectorAll('.qtag').forEach(x=>x.classList.remove('active')); b.classList.add('active'); }
    render();
  });
});

// Live filters
['srch','fEngate','fValhalla','fCarga','fCat'].forEach(id => document.getElementById(id).addEventListener('input', render));
['fEngate','fValhalla','fCarga','fCat'].forEach(id => document.getElementById(id).addEventListener('change', render));

function reset() {
  ['srch'].forEach(id => document.getElementById(id).value='');
  ['fEngate','fValhalla','fCarga','fCat'].forEach(id => document.getElementById(id).value='');
  activeQ=null; sortCol=null; sortDir=1;
  document.querySelectorAll('.qtag').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('th[data-s]').forEach(t=>{ t.classList.remove('sorted'); t.querySelector('span').textContent='↕'; });
  render();
}

function playNow() {
  document.getElementById('fEngate').value   = 'Rápido';
  document.getElementById('fValhalla').value = '2';
  document.getElementById('fCarga').value    = 'Baixa';
  activeQ=null; document.querySelectorAll('.qtag').forEach(b=>b.classList.remove('active'));
  render();
}

// Init
document.getElementById('cTotal').textContent = G.length;
render();
